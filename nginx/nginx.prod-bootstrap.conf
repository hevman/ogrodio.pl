# Tymczasowy nginx PRZED wystawieniem certyfikatów SSL.
# Użyj: zamień w docker-compose.prod.yml ścieżkę na nginx.prod-bootstrap.conf,
# uruchom stack, wystaw certy (deploy/ssl-init.sh), potem wróć do nginx.prod.conf

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 12m;
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name
            ogrodio.pl www.ogrodio.pl
            sklep.ogrodio.pl
            app.ogrodio.pl
            panel.ogrodio.pl
            api.ogrodio.pl;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        location ^~ /api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        location /shop-api {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_set_header Host $host;
        }

        location /assets {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_set_header Host $host;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
