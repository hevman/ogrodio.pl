events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 12m;

    include /etc/nginx/includes/cloudflare-real-ip.conf;

    # Cloudflare przekazuje X-Forwarded-Proto; fallback na $scheme (połączenie origin)
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Port 80 — redirect na HTTPS (Cloudflare i bezpośrednie wejście)
    server {
        listen 80;
        server_name
            ogrodio.pl www.ogrodio.pl
            sklep.ogrodio.pl
            app.ogrodio.pl
            panel.ogrodio.pl
            api.ogrodio.pl;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── API (NestJS) ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name www.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        return 301 https://ogrodio.pl$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        location / {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }
    }

    # ─── Panel administracyjny ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name panel.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            include /etc/nginx/includes/proxy-headers.conf;
        }
    }

    # ─── Strona / sklep / aplikacja ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name
            ogrodio.pl
            sklep.ogrodio.pl
            app.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ~* ^/images/articles/.+\.(jpe?g|png)$ {
            return 404;
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ^~ /api/auth/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/shop/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/garden/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/articles {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /shop-api {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /admin-api {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /dashboard {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /assets {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
