events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 12m;

    proxy_cache_path /var/cache/nginx/next-image
        levels=1:2
        keys_zone=next_image_cache:20m
        max_size=1g
        inactive=31d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/frontend-html
        levels=1:2
        keys_zone=frontend_html_cache:20m
        max_size=512m
        inactive=10m
        use_temp_path=off;

    include /etc/nginx/includes/cloudflare-real-ip.conf;

    # Cloudflare przekazuje X-Forwarded-Proto; fallback na $scheme (połączenie origin)
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $host $is_public_site_host {
        default 0;
        ogrodio.pl 1;
        www.ogrodio.pl 1;
    }

    map "$is_public_site_host:$http_cookie" $skip_public_html_cache {
        default 1;
        "~^1:$" 0;
        "~^1:(?!(.*(?:garden_access|panel_access)=))" 0;
    }

    limit_req_zone $binary_remote_addr zone=auth_write_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=staff_auth_limit:10m rate=5r/m;
    limit_req_status 429;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Port 80 — redirect na HTTPS (Cloudflare i bezpośrednie wejście)
    server {
        listen 80;
        server_name
            ogrodio.pl www.ogrodio.pl
            sklep.ogrodio.pl
            app.ogrodio.pl
            panel.ogrodio.pl
            api.ogrodio.pl;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── API (NestJS) ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name www.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        return 301 https://ogrodio.pl$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        location = /api/auth/login {
            limit_req zone=auth_write_limit burst=5 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location = /api/auth/register {
            limit_req zone=auth_write_limit burst=3 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location / {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }
    }

    # ─── Panel administracyjny ────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name panel.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location = /panel-api/staff/auth/login {
            limit_req zone=staff_auth_limit burst=3 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            include /etc/nginx/includes/proxy-headers.conf;
        }
    }

    # ─── Strona / sklep / aplikacja ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name
            ogrodio.pl
            sklep.ogrodio.pl
            app.ogrodio.pl;

        include /etc/nginx/includes/ssl-cloudflare.conf;

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ~* ^/images/articles/.+\.(jpe?g|png)$ {
            return 404;
        }

        location ^~ /_next/static/ {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location ^~ /_next/image {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache next_image_cache;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri|$http_accept";
            proxy_cache_valid 200 31d;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 20s;
            proxy_ignore_headers Set-Cookie;
            proxy_hide_header Set-Cookie;
            proxy_hide_header Cache-Control;
            expires 31d;
            add_header Cache-Control "public, max-age=2678400, immutable";
            add_header X-Proxy-Cache $upstream_cache_status;
        }

        location = / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache frontend_html_cache;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri|$http_accept_encoding";
            proxy_cache_valid 200 5m;
            proxy_cache_lock on;
            proxy_cache_bypass $http_upgrade $skip_public_html_cache;
            proxy_no_cache $http_upgrade $skip_public_html_cache;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_hide_header Set-Cookie;
            add_header X-HTML-Cache $upstream_cache_status;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location = /porady {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache frontend_html_cache;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri|$http_accept_encoding";
            proxy_cache_valid 200 5m;
            proxy_cache_lock on;
            proxy_cache_bypass $skip_public_html_cache;
            proxy_no_cache $skip_public_html_cache;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_hide_header Set-Cookie;
            add_header X-HTML-Cache $upstream_cache_status;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /porady/ {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache frontend_html_cache;
            proxy_cache_key "$scheme|$request_method|$host|$request_uri|$http_accept_encoding";
            proxy_cache_valid 200 5m;
            proxy_cache_lock on;
            proxy_cache_bypass $skip_public_html_cache;
            proxy_no_cache $skip_public_html_cache;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_hide_header Set-Cookie;
            add_header X-HTML-Cache $upstream_cache_status;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /products/ {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location = /api/auth/login {
            limit_req zone=auth_write_limit burst=5 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location = /api/auth/register {
            limit_req zone=auth_write_limit burst=3 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/auth/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/shop/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/garden/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /api/articles {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location = /panel-api/staff/auth/login {
            limit_req zone=staff_auth_limit burst=3 nodelay;
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /shop-api {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /admin-api {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            include /etc/nginx/includes/proxy-headers.conf;
        }

        location /dashboard {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /assets {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
