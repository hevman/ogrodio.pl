events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    client_max_body_size 12m;

    # Odświeżaj DNS co 30s — zapobiega 502 po restarcie kontenerów
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── Panel API (backend NestJS) ────────────────────────────────────────────
    server {
        listen 80;
        server_name api.ogrodio.localhost;

        location / {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Panel administracyjny ────────────────────────────────────────────────
    server {
        listen 80;
        server_name panel.ogrodio.localhost;

        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Sklep / Strona główna ────────────────────────────────────────────────
    server {
        listen 80;
        server_name sklep.ogrodio.localhost ogrodio.localhost app.ogrodio.localhost localhost;

        # Zdjecia artykulow trzymamy poza obrazem frontendu, na dysku serwera.
        location /images/articles/ {
            alias /uploads/articles/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location ~* ^/images/articles/.+\.(jpe?g|png)$ {
            return 404;
        }

        # HLS video — segmenty i playlisty
        location /videos/ {
            alias /uploads/videos/;
            access_log off;

            # Cache segmentów TS - immutable (nazwa zawiera nr segmentu)
            location ~* \.ts$ {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
                add_header Access-Control-Allow-Origin "*";
            }

            # Playlisty .m3u8 - krótki cache bo mogą być aktualizowane
            location ~* \.m3u8$ {
                expires 10s;
                add_header Cache-Control "public, max-age=10";
                add_header Access-Control-Allow-Origin "*";
                add_header Content-Type "application/vnd.apple.mpegurl";
            }
        }
        location ^~ /uploads/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # NestJS — auth/API klientów sklepu
        location ^~ /api/auth/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/shop/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/garden/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/articles {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/plants {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /panel-api/ {
            set $backend_upstream backend:3000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend sklepu
        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vendure Shop API (klienci)
        location /shop-api {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vendure Admin API — dostępny tylko przez backend NestJS, nie bezpośrednio z panelu
        location /admin-api {
            # Blokuj bezpośredni dostęp z zewnątrz
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vendure Dashboard (zablokowany z zewnątrz — SSO przez NestJS)
        location /dashboard {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /assets {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /mailbox {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /graphiql {
            set $commerce_upstream commerce-server:3000;
            proxy_pass http://$commerce_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
