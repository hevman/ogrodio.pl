# Ogrodio — utwardzenie SSH (drop-in, nie nadpisuje całego sshd_config)
# Po zmianie: sshd -t && systemctl reload sshd

# Wyłącz puste hasła
PermitEmptyPasswords no

# Ogranicz próby logowania
MaxAuthTries 4
LoginGraceTime 30

# Keepalive — zrywa martwe sesje
ClientAliveInterval 300
ClientAliveCountMax 2

# X11 forwarding niepotrzebny na serwerze prod
X11Forwarding no

# Tylko protokół 2
Protocol 2
